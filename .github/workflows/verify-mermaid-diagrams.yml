name: Verify Mermaid Diagrams

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/images/**/*.mmd'
      - 'docs/images/**/*.png'
      - 'docs/mermaid-kvadrat-theme.json'
      - 'scripts/check_mermaid_diagrams.py'
      - '.github/workflows/verify-mermaid-diagrams.yml'
  push:
    branches: [main]
    paths:
      - 'docs/images/**/*.mmd'
      - 'docs/images/**/*.png'
      - 'docs/mermaid-kvadrat-theme.json'
      - 'scripts/check_mermaid_diagrams.py'
      - '.github/workflows/verify-mermaid-diagrams.yml'
  workflow_dispatch: {}

jobs:
  diagram-consistency:
    name: Ensure Mermaid diagrams are up to date
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: 🧰 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libasound2t64 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            fonts-noto-color-emoji

      - name: 🔧 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.11.1'

      - name: 📦 Install Node.js dependencies
        run: npm ci

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🔧 Configure Puppeteer for CI
        run: |
          PUPPETEER_CONFIG=$(mktemp)
          printf '{"args":["--no-sandbox","--disable-setuid-sandbox","--disable-dev-shm-usage"]}' \
            > "$PUPPETEER_CONFIG"
          echo "PUPPETEER_CONFIG_FILE=$PUPPETEER_CONFIG" >> "$GITHUB_ENV"

      - name: 🛠️ Regenerate missing Mermaid diagrams
        run: python3 scripts/check_mermaid_diagrams.py --write-missing

      - name: 🔍 Verify Mermaid diagrams
        run: python3 scripts/check_mermaid_diagrams.py

      - name: 🔁 Auto-commit regenerated PNGs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          CHANGED=$(git status --porcelain=1 docs/images | grep '\.png$' || true)
          if [ -z "$CHANGED" ]; then
            echo "All PNGs are up to date — nothing to commit."
            exit 0
          fi

          echo "Committing regenerated PNGs:"
          echo "$CHANGED"
          git add docs/images/*.png
          git commit -m "chore: auto-regenerate Mermaid diagram PNGs [skip ci]"

          # Retry push with pull-rebase to handle concurrent pushes to the same branch
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD; then
              echo "Push succeeded on attempt $attempt."
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Push failed after 5 attempts."
              exit 1
            fi
            echo "Push rejected (attempt $attempt); rebasing and retrying..."
            git pull --rebase origin HEAD
          done
