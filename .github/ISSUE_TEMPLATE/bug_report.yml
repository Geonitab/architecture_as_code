name: Bug Report
description: Report a bug or unexpected behaviour in the project
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill in as much detail as possible to help us resolve the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide step-by-step instructions to reproduce the behaviour.
      placeholder: |
        1. Run command '...'
        2. Open file '...'
        3. Observe error '...'
    validations:
      required: true

  - type: textarea
    id: expected-behaviour
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
      placeholder: Describe the expected behaviour...
    validations:
      required: true

  - type: textarea
    id: actual-behaviour
    attributes:
      label: Actual Behaviour
      description: What actually happened? Include any error messages.
      placeholder: Describe the actual behaviour...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details about your environment.
      placeholder: |
        - OS: (e.g. Ubuntu 22.04, macOS 14)
        - Python version: (e.g. 3.12.3)
        - Node.js version: (e.g. 20.11.1)
        - Pandoc version: (e.g. 3.1.9)
        - Branch/commit: (e.g. main / abc1234)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output or error traces here.
      render: shell
      placeholder: Paste logs here...
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate.
          required: true
        - label: I have run `make verify-env` to confirm my environment is correctly configured.
          required: false
