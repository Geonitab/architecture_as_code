name: Feature Request
description: Suggest a new feature or enhancement for the project
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement. Please provide as much context as possible so we can evaluate the proposal effectively.

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: Describe the problem or limitation you are experiencing. What is the motivation for this feature?
      placeholder: |
        I am trying to do X, but currently Y makes this difficult because Z...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you would like to see implemented.
      placeholder: Describe your proposed solution in detail...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?
      placeholder: Describe any alternative solutions or features you have considered...
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area of Impact
      description: Which part of the project does this feature relate to?
      options:
        - Book content / manuscript
        - Build pipeline (PDF, EPUB, DOCX)
        - Diagram tooling (Mermaid)
        - Documentation website (MkDocs)
        - CI/CD workflows
        - Presentation generation
        - Whitepaper generation
        - Testing / validation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or references that would help us understand the request.
      placeholder: Add any other context here...
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I have searched existing issues to ensure this is not a duplicate.
          required: true
